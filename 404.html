<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Dahira Mafatihoul Bichri</title>
  <link rel="icon" type="image/png" href="/src/img/logodudahira.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #063d30 0%, #0a5443 60%, #0F6E56 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #fff;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    .code {
      font-family: 'Playfair Display', serif;
      font-size: 6rem;
      font-weight: 700;
      color: #D4AD4A;
      line-height: 1;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background: #D4AD4A;
      color: #063d30;
      font-weight: 700;
      font-size: 0.9rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: background 0.2s;
    }

    a:hover {
      background: #E4C96E;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/src/img/logodudahira.png" alt="Logo Dahira" class="logo" />
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas ou a été déplacée.<br>Retournez à l'accueil du dahira.</p>
    <a href="/">✦ Retour à l'accueil</a>
  </div>
</body>
</html>
